{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Create Account — AUCA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://res.cloudinary.com/dhqrnqcwa/image/upload/v1775858111/static/img/static/img/favicon.png">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        :root{--navy:rgb(45,77,104);--dark:#0f1f2e;--teal:#2a9d8f;--bg:#eef1f5;--white:#fff;--muted:#7a8a99;--border:#e4e8ed;--red:#c0392b}
        body{font-family:'Segoe UI',Arial,sans-serif;background:var(--bg);color:#1a2a3a;min-height:100vh}
        .navbar{background:var(--dark);height:62px;padding:0 36px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
        .navbar a{color:white;text-decoration:none;font-size:14px}
        .navbar-brand{font-weight:700;font-size:16px;letter-spacing:1px;text-transform:uppercase}
        .main{max-width:600px;margin:36px auto;padding:0 24px}
        h1{font-size:22px;margin-bottom:24px}
        .card{background:var(--white);border-radius:12px;padding:28px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px}
        .form-group{margin-bottom:14px}
        label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:5px}
        input,select{width:100%;border:1px solid #ccc;border-radius:7px;padding:9px 12px;font-size:13px;font-family:inherit}
        input:focus,select:focus{outline:none;border-color:var(--teal)}
        .btn{display:inline-block;padding:10px 24px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none;text-decoration:none}
        .btn-teal{background:var(--teal);color:white}
        .btn-outline{background:transparent;border:1px solid var(--border);color:#555;margin-left:10px}
        .msg-error{padding:10px 16px;border-radius:7px;font-size:13px;margin-bottom:16px;background:#fdecea;color:var(--red)}
        footer{text-align:center;padding:24px;font-size:12px;color:#b0bec5;border-top:1px solid var(--border);background:var(--white);margin-top:40px}
        @media(max-width:600px){.form-row{grid-template-columns:1fr}}
    </style>
</head>
<body>
<nav class="navbar">
    <a class="navbar-brand" href="{% url 'dashboard' %}">AUCA Portal</a>
    <a href="{% url 'admin_panel:user_list' %}" style="color:white;text-decoration:none;font-size:14px;">&#8592; Users</a>
</nav>
<main class="main">
    {% if messages %}{% for m in messages %}<div class="msg-error">{{ m }}</div>{% endfor %}{% endif %}

    <h1>Create New Account</h1>
    <div class="card">
        <form method="POST">
            {% csrf_token %}
            <div class="form-row">
                <div class="form-group">
                    <label>First Name *</label>
                    <input type="text" name="first_name" required placeholder="First name">
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" name="last_name" placeholder="Last name">
                </div>
            </div>
            <div class="form-group">
                <label>Email *</label>
                <input type="email" name="email" required placeholder="user@auca.ac.rw">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Role *</label>
                    <select name="role" required>
                        <option value="student">Student</option>
                        <option value="lecturer">Lecturer</option>
                        <option value="staff">Staff / Admin</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Student ID</label>
                    <input type="text" name="student_id" placeholder="AUCA-2024-XXXX">
                </div>
            </div>
            <div class="form-group">
                <label>Password *</label>
                <input type="password" name="password" required placeholder="Set initial password">
            </div>
            <button type="submit" class="btn btn-teal">Create Account</button>
            <a href="{% url 'admin_panel:user_list' %}" class="btn btn-outline">Cancel</a>
        </form>
    </div>
</main>
<footer>&copy; 2025 Adventist University of Central Africa</footer>
</body>
</html>
