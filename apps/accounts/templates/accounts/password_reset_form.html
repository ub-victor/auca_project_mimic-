{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AUCA – Reset Password</title>
    <link rel="icon" href="{% static 'img/favicon.png' %}" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; font-family: 'Segoe UI', Tahoma, Arial, sans-serif; background: #fff; }
        .page-wrap { display: flex; height: 100vh; width: 100%; }
        .left-panel {
            width: 50%; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 48px 32px; background: #fff; overflow-y: auto;
        }
        .inner { width: 100%; max-width: 380px; }
        .logo-wrap { display: flex; justify-content: center; margin-bottom: 28px; }
        .logo-img { width: 220px; height: auto; }
        h1.page-heading { font-size: 1.65rem; font-weight: 700; color: #1a4799; text-align: center; margin-bottom: 8px; }
        .page-subtitle { font-size: 0.82rem; color: #555; text-align: center; margin-bottom: 28px; line-height: 1.5; }
        .form-group { margin-bottom: 16px; }
        .field-label { font-size: 0.82rem; color: #333; margin-bottom: 5px; display: block; font-weight: 500; }
        .form-input {
            display: block; width: 100%; border: 1px solid #bbb; border-radius: 3px;
            padding: 9px 12px; font-size: 0.88rem; color: #333; background: #fff; outline: none;
            transition: border-color 0.2s;
        }
        .form-input:focus { border-color: #1a4799; box-shadow: 0 0 0 2px rgba(26,71,153,0.1); }
        .btn-send {
            display: block; width: 100%; margin-top: 20px; background: #5b7fba; color: #fff;
            border: none; border-radius: 4px; padding: 11px; font-size: 0.9rem;
            font-weight: 600; cursor: pointer; transition: background 0.2s;
        }
        .btn-send:hover { background: #1a4799; }
        .bottom-link { display: block; text-align: center; font-size: 0.82rem; color: #555; margin-top: 14px; }
        .bottom-link a { color: #1a4799; text-decoration: none; font-weight: 600; }
        .right-panel {
            width: 50%; flex-shrink: 0;
            background-image: url("{% static 'img/gishushu_campus.jpg' %}");
            background-size: cover; background-position: center;
        }
        @media (max-width: 600px) {
            .page-wrap { flex-direction: column; height: auto; min-height: 100vh; }
            .left-panel { width: 100%; padding: 32px 20px 40px; }
            .right-panel { display: block; width: 100%; height: 220px; order: -1; }
        }
    </style>
</head>
<body>
    <div class="page-wrap">
        <div class="left-panel">
            <div class="inner">
                <div class="logo-wrap">
                    <img src="{% static 'img/auca_logo.png' %}" alt="AUCA Logo" class="logo-img"/>
                </div>
                <h1 class="page-heading">Reset Password</h1>
                <p class="page-subtitle">Enter your email and we'll send a reset link to your console.</p>

                <form method="POST">
                    {% csrf_token %}
                    <div class="form-group">
                        <label class="field-label" for="{{ form.email.id_for_label }}">Email Address</label>
                        <input
                            type="email"
                            id="{{ form.email.id_for_label }}"
                            name="{{ form.email.html_name }}"
                            class="form-input"
                            placeholder="your@email.com"
                            value="{{ form.email.value|default:'' }}"
                            required
                        />
                        {% if form.email.errors %}
                            <p style="color:red;font-size:0.75rem;margin-top:4px;">{{ form.email.errors.0 }}</p>
                        {% endif %}
                    </div>
                    <button type="submit" class="btn-send">Send Reset Link</button>
                    <span class="bottom-link">
                        Remember your password? <a href="{% url 'login' %}">Login</a>
                    </span>
                </form>
            </div>
        </div>
        <div class="right-panel"></div>
    </div>
</body>
</html>
