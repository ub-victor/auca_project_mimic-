{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AUCA Registration – Signup</title>
    <link rel="icon" href="https://res.cloudinary.com/dhqrnqcwa/image/upload/v1775858111/static/img/static/img/favicon.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background: #fff;
        }

        /* ── SPLIT LAYOUT ─────────────────────── */
        .page-wrap {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* ── LEFT PANEL ───────────────────────── */
        .left-panel {
            width: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 32px;
            background: #fff;
            overflow-y: auto;
        }

        .inner {
            width: 100%;
            max-width: 380px;
        }

        /* Logo */
        .logo-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 22px;
        }

        .logo-img {
            width: 220px;
            height: auto;
        }



        /* Heading */
        h1.page-heading {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1a4799;
            text-align: center;
            margin-bottom: 22px;
        }

        /* Form fields */
        .form-group {
            margin-bottom: 10px;
        }

        .field-label {
            font-size: 0.8rem;
            color: #333;
            margin-bottom: 3px;
            display: block;
            font-weight: 400;
        }

        .form-input {
            display: block;
            width: 100%;
            border: 1px solid #bbb;
            border-radius: 3px;
            padding: 6px 10px;
            font-size: 0.87rem;
            color: #333;
            background: #fff;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input::placeholder {
            color: #aaa;
            font-size: 0.83rem;
        }

        .form-input:focus {
            border-color: #1a4799;
            box-shadow: 0 0 0 2px rgba(26,71,153,0.1);
        }

        /* Create Account button */
        .btn-create {
            display: block;
            margin: 20px auto 14px;
            background: #5b7fba;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 9px 28px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-create:hover { background: #1a4799; }

        /* Bottom link */
        .bottom-link {
            display: block;
            text-align: center;
            font-size: 0.82rem;
            color: #555;
        }

        .bottom-link a {
            color: #1a4799;
            text-decoration: none;
            font-weight: 600;
        }

        .bottom-link a:hover { text-decoration: underline; }

        /* Error messages */
        .alert-error {
            background: #fdf0ef;
            border: 1px solid #e8a49a;
            color: #c0392b;
            border-radius: 3px;
            padding: 8px 12px;
            font-size: 0.8rem;
            margin-bottom: 12px;
        }

        /* ── RIGHT PANEL ──────────────────────── */
        .right-panel {
            width: 50%;
            flex-shrink: 0;
            background-image: url("https://res.cloudinary.com/dhqrnqcwa/image/upload/v1775858120/static/signupimgs/static/signupimgs/gishushu_campus.jpg");
            background-size: cover;
            background-position: center;
        }

        /* ── TABLET (≤ 992px) ──────────────────── */
        @media (max-width: 992px) {
            .left-panel  {
                width: 60%;
                padding: 32px 24px;
            }
            .right-panel { width: 40%; }
        }

        /* ── MOBILE (≤ 600px) ──────────────────── */
        @media (max-width: 600px) {
            body, html { height: auto; }

            .page-wrap {
                flex-direction: column;
                height: auto;
                min-height: 100vh;
            }

            .left-panel {
                width: 100%;
                padding: 28px 20px 40px;
                justify-content: flex-start;
            }

            .inner {
                max-width: 100%;
            }

            .logo-img { width: 180px; }

            h1.page-heading { font-size: 1.1rem; }

            .right-panel {
                display: block;
                width: 100%;
                height: 220px;
                order: -1;
            }
        }
    </style>
</head>
<body>
    <div class="page-wrap">

        <!-- LEFT PANEL -->
        <div class="left-panel">
            <div class="inner">

                <!-- Logo -->
                <div class="logo-wrap">
                    <img src="https://res.cloudinary.com/dhqrnqcwa/image/upload/v1775858120/static/signupimgs/static/signupimgs/auca_logo.png" alt="AUCA Logo" class="logo-img" />
                </div>

                <!-- Heading -->
                <h1 class="page-heading">Create new account</h1>

                <!-- Error messages -->
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert-error">{{ message }}</div>
                    {% endfor %}
                {% endif %}

                <!-- Form -->
                <form method="POST" action="{% url 'signup' %}">
                    {% csrf_token %}

                    <div class="form-group">
                        <label class="field-label" for="student_id">Enter your ID</label>
                        <input
                            type="text"
                            id="student_id"
                            name="student_id"
                            class="form-input"
                            placeholder="Enter your Student Reg No"
                            value="{{ form_data.student_id|default:'' }}"
                            required
                        />
                    </div>

                    <div class="form-group">
                        <label class="field-label" for="first_name">Enter your Firstname</label>
                        <input
                            type="text"
                            id="first_name"
                            name="first_name"
                            class="form-input"
                            placeholder="Enter only your first name (one name)"
                            value="{{ form_data.first_name|default:'' }}"
                            required
                        />
                    </div>

                    <div class="form-group">
                        <label class="field-label" for="email">Enter your Email</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            class="form-input"
                            placeholder=""
                            value="{{ form_data.email|default:'' }}"
                            required
                        />
                    </div>

                    <div class="form-group">
                        <label class="field-label" for="password">Password</label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            class="form-input"
                            required
                        />
                    </div>

                    <div class="form-group">
                        <label class="field-label" for="confirm_password">Re-type password</label>
                        <input
                            type="password"
                            id="confirm_password"
                            name="confirm_password"
                            class="form-input"
                            required
                        />
                    </div>

                    <button type="submit" class="btn-create">Create Account</button>

                    <span class="bottom-link">
                        Already have an account? <a href="{% url 'login' %}">Login</a>
                    </span>
                </form>
            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="right-panel"></div>
    </div>
</body>
</html>
