{% extends "base.html" %}
{% load static %}

{% block title %}AUCA Registration - Signup{% endblock %}
{% block body_class %}auth-page{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">
{% endblock %}

{% block content %}
<main class="auth-shell">
    <section class="auth-panel" aria-labelledby="signup-heading">
        <div class="auth-card">
            <img src="{% static 'images/aucalogo.png' %}" alt="AUCA Logo" class="auth-logo">

            <form method="POST" action="{% url 'signup' %}" class="auth-form" data-validate-form novalidate>
                {% csrf_token %}

                <h1 id="signup-heading">Create new account</h1>

                <div class="form-group">
                    <label for="student_id">Enter your ID</label>
                    <input type="text" id="student_id" name="student_id" class="form-input" placeholder="Enter your Student Reg No" value="{{ form_data.student_id|default:'' }}" required>
                </div>

                <div class="form-group">
                    <label for="first_name">Enter your Firstname</label>
                    <input type="text" id="first_name" name="first_name" class="form-input" placeholder="Enter only your first name" value="{{ form_data.first_name|default:'' }}" required>
                </div>

                <div class="form-group">
                    <label for="email">Enter your Email</label>
                    <input type="email" id="email" name="email" class="form-input" value="{{ form_data.email|default:'' }}" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-input" required>
                </div>

                <div class="form-group">
                    <label for="confirm_password">Re-type password</label>
                    <input type="password" id="confirm_password" name="confirm_password" class="form-input" required>
                </div>

                <button type="submit" class="primary-button">Create Account</button>

                <p class="auth-switch">
                    Already have an account? <a href="{% url 'login' %}">Login</a>
                </p>
            </form>
        </div>
    </section>

    <aside class="auth-image" aria-label="AUCA campus photo"></aside>
</main>
{% endblock %}
