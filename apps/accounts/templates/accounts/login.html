{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AUCA Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://res.cloudinary.com/dhqrnqcwa/image/upload/v1775858111/static/img/static/img/favicon.png" type="image/png">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
<div class="container">

    <!-- LEFT SIDE -->
    <div class="left-side">

        <img class="logo" src="https://res.cloudinary.com/dhqrnqcwa/image/upload/v1775858116/static/img/static/img/10001.png" alt="AUCA Logo">

        <form method="POST">
            {% csrf_token %}

            <h3 class="log">Login</h3>
            <p class="welcome">Welcome! Please enter your details.</p>

            {% if error %}
            <p style="color:red; text-align:center; margin-bottom:10px;">{{ error }}</p>
            {% endif %}

            <label for="email">Enter your Email or ID</label>
            <input id="email" name="email" class="carre" type="text"
                   placeholder="Enter your Email or ID" required>

            <label for="password">Password</label>
            <input id="password" name="password" class="carre" type="password"
                   placeholder="Type your Password" required>

            <a href="{% url 'forgot_password' %}" class="forgot-password">Forgot Password?</a>

            <div class="checkbox-container">
                <label>
                    <input class="checkbox" type="checkbox" name="staff">
                    I am a staff
                </label>
            </div>

            <div class="button-contener">
                <button class="p" type="submit">Sign In</button>
            </div>

            <p class="signup">
                Don't have an account? <a href="{% url 'signup' %}">Sign Up</a>
            </p>

        </form>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right-side">
        <img src="https://res.cloudinary.com/dhqrnqcwa/image/upload/v1775858113/static/img/static/img/10002.jpg" alt="Campus Photo">
    </div>

</div>
</body>
</html>
