{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AUCA Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://res.cloudinary.com/dhqrnqcwa/image/upload/v1775858111/static/img/static/img/favicon.png" type="image/png">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body>
<div class="container">

    <!-- LEFT SIDE -->
    <div class="left-side">

        <img class="logo" src="{% static 'images/aucalogo.png' %}" alt="AUCA Logo">

        <form method="POST">
            {% csrf_token %}

            <h3 class="log">Login</h3>
            <p class="welcome">Welcome! Please enter your details.</p>

            {% if messages %}
                {% for message in messages %}
                    <p style="color:{% if message.tags == 'error' %}red{% else %}green{% endif %}; text-align:center; margin-bottom:10px;">{{ message }}</p>
                {% endfor %}
            {% endif %}

            <label for="email">Enter your Email or ID</label>
            <input id="email" name="email" class="carre" type="text"
                   placeholder="Enter your Email or ID" required>

            <label for="password">Password</label>
            <input id="password" name="password" class="carre" type="password"
                   placeholder="Type your Password" required>

            <a href="{% url 'forgot_password' %}" class="forgot-password">Forgot Password?</a>

            <div class="checkbox-container">
                <label>
                    <input class="checkbox" type="checkbox" name="staff">
                    I am a staff
                </label>
            </div>

            <div class="button-contener">
                <button class="p" type="submit">Sign In</button>
            </div>

            <p class="signup">
                Don't have an account? <a href="{% url 'signup' %}">Sign Up</a>
            </p>

        </form>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right-side">
        <img src="{% static 'images/aucacampus.png' %}" alt="Campus Photo">
    </div>

</div>

<script>
    // Auto-dismiss messages after 5 seconds
    setTimeout(function() {
        const messages = document.querySelectorAll('p[style*="color"]');
        messages.forEach(function(message) {
            message.style.transition = 'opacity 0.5s';
            message.style.opacity = '0';
            setTimeout(function() {
                message.remove();
            }, 500);
        });
    }, 5000);
</script>
</body>
</html>
