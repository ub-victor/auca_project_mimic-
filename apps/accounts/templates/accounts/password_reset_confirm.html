{% extends "base.html" %}
{% block title %}Set New Password{% endblock %}
{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <h2>Set New Password</h2>
        {% if validlink %}
        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
            <div class="profile-field">
                <label>{{ field.label }}</label>
                {{ field }}
            </div>
            {% endfor %}
            <button type="submit" class="auth-btn">Set Password</button>
        </form>
        {% else %}
        <p style="color:red;">Link expired. <a href="{% url 'password_reset' %}">Request new one</a>.</p>
        {% endif %}
    </div>
</div>
{% endblock %}
