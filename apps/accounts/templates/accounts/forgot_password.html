{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AUCA Registration – Forgot Password</title>
    <link rel="icon" href="https://res.cloudinary.com/dhqrnqcwa/image/upload/v1775858111/static/img/static/img/favicon.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            background: #fff;
        }

        /* ── SPLIT LAYOUT ─────────────────────── */
        .page-wrap {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        /* ── LEFT PANEL ───────────────────────── */
        .left-panel {
            width: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 48px 32px;
            background: #fff;
            overflow-y: auto;
        }

        .inner {
            width: 100%;
            max-width: 380px;
        }

        /* Logo */
        .logo-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 28px;
        }

        .logo-img {
            width: 220px;
            height: auto;
        }

        /* Headings */
        h1.page-heading {
            font-size: 1.65rem;
            font-weight: 700;
            color: #1a4799;
            text-align: center;
            margin-bottom: 8px;
        }

        .page-subtitle {
            font-size: 0.82rem;
            color: #555;
            text-align: center;
            margin-bottom: 28px;
            line-height: 1.5;
        }

        /* Form fields */
        .form-group {
            margin-bottom: 16px;
        }

        .field-label {
            font-size: 0.82rem;
            color: #333;
            margin-bottom: 5px;
            display: block;
            font-weight: 400;
        }

        .form-input {
            display: block;
            width: 100%;
            border: 1px solid #bbb;
            border-radius: 3px;
            padding: 7px 10px;
            font-size: 0.88rem;
            color: #333;
            background: #fff;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            border-color: #1a4799;
            box-shadow: 0 0 0 2px rgba(26,71,153,0.1);
        }

        /* Send button */
        .btn-send {
            display: block;
            margin: 20px auto 14px;
            background: #5b7fba;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 9px 24px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        .btn-send:hover { background: #1a4799; }

        /* Bottom link */
        .bottom-link {
            display: block;
            text-align: center;
            font-size: 0.82rem;
            color: #555;
        }

        .bottom-link a {
            color: #1a4799;
            text-decoration: none;
            font-weight: 600;
        }

        .bottom-link a:hover { text-decoration: underline; }

        /* Alert messages */
        .alert-error {
            background: #fdf0ef;
            border: 1px solid #e8a49a;
            color: #c0392b;
            border-radius: 3px;
            padding: 8px 12px;
            font-size: 0.8rem;
            margin-bottom: 14px;
        }

        .alert-success {
            background: #edf7ed;
            border: 1px solid #9acf9a;
            color: #2e7d32;
            border-radius: 3px;
            padding: 8px 12px;
            font-size: 0.8rem;
            margin-bottom: 14px;
        }

        /* ── RIGHT PANEL ──────────────────────── */
        .right-panel {
            width: 50%;
            flex-shrink: 0;
            background-image: url("https://res.cloudinary.com/dhqrnqcwa/image/upload/v1775858120/static/signupimgs/static/signupimgs/gishushu_campus.jpg");
            background-size: cover;
            background-position: center;
        }

        /* ── TABLET (≤ 992px) ──────────────────── */
        @media (max-width: 992px) {
            .left-panel  {
                width: 60%;
                padding: 40px 24px;
            }
            .right-panel { width: 40%; }
        }

        /* ── MOBILE (≤ 600px) ──────────────────── */
        @media (max-width: 600px) {
            body, html { height: auto; }

            .page-wrap {
                flex-direction: column;
                height: auto;
                min-height: 100vh;
            }

            .left-panel {
                width: 100%;
                padding: 32px 20px 40px;
                justify-content: flex-start;
            }

            .inner {
                max-width: 100%;
            }

            .logo-img { width: 180px; }

            h1.page-heading { font-size: 1.4rem; }

            .right-panel {
                display: block;
                width: 100%;
                height: 220px;
                order: -1;
            }
        }
    </style>
</head>
<body>
    <div class="page-wrap">

        <!-- LEFT PANEL -->
        <div class="left-panel">
            <div class="inner">

                <!-- Logo -->
                <div class="logo-wrap">
                    <img src="https://res.cloudinary.com/dhqrnqcwa/image/upload/v1775858120/static/signupimgs/static/signupimgs/auca_logo.png" alt="AUCA Logo" class="logo-img" />
                </div>

                <!-- Headings -->
                <h1 class="page-heading">Reset password</h1>
                <p class="page-subtitle">We will send password reset instructions on your email.</p>

                <!-- Messages -->
                {% if messages %}
                    {% for message in messages %}
                        <div class="{% if message.tags == 'error' %}alert-error{% else %}alert-success{% endif %}">
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}

                <!-- Form -->
                <form method="POST" action="{% url 'forgot_password' %}">
                    {% csrf_token %}

                    <div class="form-group">
                        <label class="field-label" for="email">Enter your Email</label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            class="form-input"
                            value="{{ submitted_email|default:'' }}"
                        />
                    </div>

                    <div class="text-center">
                        <button type="submit" class="btn-send">Send Reset Instructions</button>
                    </div>

                    <span class="bottom-link">
                        Remember the password? <a href="{% url 'login' %}">Login</a>
                    </span>
                </form>

            </div>
        </div>

        <!-- RIGHT PANEL -->
        <div class="right-panel"></div>
    </div>
</body>
</html>
