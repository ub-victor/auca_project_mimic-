{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AUCA Portal{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

    {% if messages %}
        <div style="padding: 10px 20px;">
            {% for message in messages %}
                <div class="alert-{% if message.tags == 'error' %}error{% else %}success{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        </div>
    {% endif %}

    {% block content %}{% endblock %}

    <footer style="text-align:center; padding:20px; font-size:12px;
                   color:#b0bec5; border-top:1px solid #e4e8ed; margin-top:40px;">
        &copy; 2025 Adventist University of Central Africa
    </footer>

</body>
</html>
